name: Sync Source To Dotcom

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read

jobs:
  sync-source:
    runs-on: [self-hosted, Linux]
    environment: source-sync-production
    env:
      TAG_NAME: ${{ github.ref_name }}
      TARGET_REPO_OWNER: VTB-LINK
      TARGET_REPO_NAME: Metabox-Nexus-WesingCap
      TARGET_BRANCH: main
      GIT_AUTHOR_NAME: github-actions[bot]
      GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
      GIT_COMMITTER_NAME: github-actions[bot]
      GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
      GH_TOKEN: ${{ secrets.GH_DOTCOM_TOKEN }}

    steps:
      - name: Checkout tagged source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Sync tagged snapshot to github.com main
        run: |
          set -euo pipefail

          if [ -z "${GH_TOKEN:-}" ]; then
            echo "::error::Missing secret GH_DOTCOM_TOKEN"
            exit 1
          fi

          TARGET_REPO="${TARGET_REPO_OWNER}/${TARGET_REPO_NAME}"

          SNAPSHOT_DIR="$(mktemp -d)"
          TARGET_DIR="$(mktemp -d)"
          TARGET_URL="https://x-access-token:${GH_TOKEN}@github.com/${TARGET_REPO}.git"

          echo "Exporting snapshot for tag ${TAG_NAME}..."
          git archive --format=tar "${TAG_NAME}" | tar -xf - -C "${SNAPSHOT_DIR}"

          echo "Cloning target repository main branch..."
          git clone --branch "${TARGET_BRANCH}" --single-branch "${TARGET_URL}" "${TARGET_DIR}"

          cd "${TARGET_DIR}"
          git config user.name "${GIT_AUTHOR_NAME}"
          git config user.email "${GIT_AUTHOR_EMAIL}"

          echo "Replacing tracked content with tagged snapshot..."
          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -R "${SNAPSHOT_DIR}/." .

          git add -A

          if git diff --cached --quiet; then
            echo "No changes detected for ${TAG_NAME}; reusing current ${TARGET_BRANCH} HEAD."
            TARGET_COMMIT="$(git rev-parse HEAD)"
          else
            git commit -m "sync: source snapshot for ${TAG_NAME}"

            echo "Pushing snapshot commit to ${TARGET_REPO}:${TARGET_BRANCH}..."
            git push origin "${TARGET_BRANCH}"

            TARGET_COMMIT="$(git rev-parse HEAD)"
          fi

          echo "Updating tag ${TAG_NAME} to ${TARGET_COMMIT} on ${TARGET_REPO}..."
          git tag -f "${TAG_NAME}" "${TARGET_COMMIT}"
          git push origin "refs/tags/${TAG_NAME}" --force

          echo "Source sync completed for tag ${TAG_NAME}."
